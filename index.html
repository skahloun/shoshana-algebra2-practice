<script>
// ============ UTILITY ============
function randInt(a, b) { return a + Math.floor(Math.random() * (b - a + 1)); }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function shuffle(arr) { let a = [...arr]; for (let i = a.length - 1; i > 0; i--) { let j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }
function gcd(a, b) { a = Math.abs(a); b = Math.abs(b); return b === 0 ? a : gcd(b, a % b); }
function fmtFrac(n, d) {
    if (d < 0) { n = -n; d = -d; }
    let g = gcd(Math.abs(n), d);
    n /= g; d /= g;
    if (d === 1) return `${n}`;
    return `${n}/${d}`;
}
function approxEq(a, b, tol) { return Math.abs(a - b) < (tol || 0.01); }
function evalFrac(s) {
    s = s.trim().replace(/\s/g, '');
    if (s.includes('/')) { let p = s.split('/'); return parseFloat(p[0]) / parseFloat(p[1]); }
    return parseFloat(s);
}

let questions = [];
let timerInterval;
let timeLeft = 40 * 60;
let quizSubmitted = false;
let selectedOptions = {};
let selectedGraphs = {};

// ============ Q1: X-intercepts of rational function ============
function genQ1() {
    // f(x) = (x - a)(x - b) / (x² - c²) where a,b are not ±c
    let a = randInt(-5, 0);
    let b = randInt(1, 6);
    while (b === -a) b = randInt(1, 6);
    let c = pick([2, 3, 4, 5]);
    while (c === Math.abs(a) || c === Math.abs(b)) c = pick([2, 3, 4, 5]);
    // x-intercepts are x = a and x = b
    let smaller = Math.min(a, b);
    let larger = Math.max(a, b);
    // Display: f(x) = (x - a)(2x + ...) / (x² - c²) ... actually let's keep it simple
    let aStr = a >= 0 ? `x - ${a}` : `x + ${-a}`;
    let bStr = b >= 0 ? `x - ${b}` : `x + ${-b}`;
    return {
        type: 'two_inputs',
        text: `Find both of the x-intercepts of the function f(x) = (${aStr})(${bStr}) / (x\u00B2 - ${c*c}).`,
        answer: `x = ${smaller} and x = ${larger}`,
        smallerAnswer: `${smaller}`,
        largerAnswer: `${larger}`,
        validateSmaller: (s) => approxEq(evalFrac(s), smaller, 0.01),
        validateLarger: (s) => approxEq(evalFrac(s), larger, 0.01),
        labels: ['Smaller intercept at x =', 'Larger intercept at x =']
    };
}

// ============ Q2: Solve quadratic equation ============
function genQ2() {
    // ax² + bx + c = 0 with nice rational roots
    let r1n = randInt(-6, -1), r1d = pick([1, 2, 3]);
    let r2n = randInt(1, 6), r2d = pick([1, 2, 3]);
    // (r1d*x - r1n)(r2d*x - r2n) = 0
    // r1d*r2d*x² - (r1d*r2n + r2d*r1n)x + r1n*r2n = 0
    let A = r1d * r2d;
    let B = -(r1d * r2n + r2d * r1n);
    let C = r1n * r2n;
    let sol1 = r1n / r1d;
    let sol2 = r2n / r2d;
    let smaller = Math.min(sol1, sol2);
    let larger = Math.max(sol1, sol2);
    let smallerStr = fmtFrac(r1n < r2n ? r1n : r2n, r1n < r2n ? r1d : r2d);
    let largerStr = fmtFrac(r1n < r2n ? r2n : r2d === 1 ? r2n : r2n, r1n < r2n ? r2d : r2d);
    // Fix: compute properly
    if (sol1 < sol2) {
        smallerStr = r1d === 1 ? `${r1n}` : fmtFrac(r1n, r1d);
        largerStr = r2d === 1 ? `${r2n}` : fmtFrac(r2n, r2d);
    } else {
        smallerStr = r2d === 1 ? `${r2n}` : fmtFrac(r2n, r2d);
        largerStr = r1d === 1 ? `${r1n}` : fmtFrac(r1n, r1d);
    }
    let bSign = B >= 0 ? '+' : '-';
    let cSign = C >= 0 ? '+' : '-';
    let eq = `${A}x\u00B2 ${bSign} ${Math.abs(B)}x ${cSign} ${Math.abs(C)} = 0`;
    return {
        type: 'two_inputs',
        text: `The equation ${eq} has two solutions. What are they?`,
        answer: `x = ${smallerStr} and x = ${largerStr}`,
        smallerAnswer: smallerStr,
        largerAnswer: largerStr,
        validateSmaller: (s) => approxEq(evalFrac(s), smaller, 0.01),
        validateLarger: (s) => approxEq(evalFrac(s), larger, 0.01),
        labels: ['Smaller solution x =', 'Larger solution x =']
    };
}

// ============ Q3: Rational inequality ============
function genQ3() {
    // x/(x-a) + b < 0 type
    let a = pick([1, 2, 3, 4, 5]);
    let b = pick([2, 3, 4, 5]);
    // x/(x-a) + b < 0 => (x + b(x-a))/(x-a) < 0 => ((1+b)x - ab)/(x-a) < 0
    let num_coeff = 1 + b;
    let num_const = a * b;
    let critical = num_const / num_coeff; // numerator = 0
    // Sign analysis: (num_coeff*x - num_const)/(x - a) < 0
    // Critical points: x = num_const/num_coeff and x = a
    // Since num_coeff > 0, numerator positive when x > critical
    let cp1 = Math.min(critical, a);
    let cp2 = Math.max(critical, a);
    // For this setup, critical < a always since ab/(1+b) < a
    // So solution is: x < critical or x > a... no wait
    // (num_coeff*x - ab)/(x-a) < 0
    // + when both pos or both neg
    // num = 0 at x = ab/(1+b), denom = 0 at x = a
    // ab/(1+b) < a since b/(1+b) < 1
    // For x < ab/(1+b): num < 0, denom < 0 => quotient > 0 (not < 0)
    // For ab/(1+b) < x < a: num > 0, denom < 0 => quotient < 0 (YES)
    // For x > a: num > 0, denom > 0 => quotient > 0 (not < 0)
    let lo = critical;
    let hi = a;
    let loStr, hiStr;
    if (num_const % num_coeff === 0) {
        loStr = `${num_const / num_coeff}`;
    } else {
        let g = gcd(num_const, num_coeff);
        loStr = `${num_const/g}/${num_coeff/g}`;
    }
    hiStr = `${a}`;
    let answer = `${loStr} < x < ${hiStr}`;
    let options = shuffle([
        answer,
        `x < ${loStr}`,
        `x > ${hiStr}`,
        `x < ${loStr} or x > ${hiStr}`,
        `${loStr} \u2264 x \u2264 ${hiStr}`
    ]);
    return {
        type: 'mc',
        text: `What is the solution set to the inequality x/(x \u2212 ${a}) + ${b} < 0?`,
        answer: answer,
        options: options
    };
}

// ============ Q4: Factoring polynomials ============
function genQ4() {
    let a = pick([2, 3, 4, 5]);
    let variants = [
        {
            text: `Which of the following are factors of x\u00B3 \u2212 ${a*a*a}?`,
            answer: `Only (x \u2212 ${a})`,
            options: shuffle([
                `Only (x \u2212 ${a})`,
                `Both (x \u2212 ${a}) and (x + ${a})`,
                `(x \u2212 ${a}), (x + ${a}), and (x\u00B2 + ${a*a})`,
                `None of them`,
                `Only (x + ${a})`
            ])
        },
        {
            text: `Which of the following are factors of x\u00B3 + ${a*a*a}?`,
            answer: `Only (x + ${a})`,
            options: shuffle([
                `Only (x + ${a})`,
                `Both (x \u2212 ${a}) and (x + ${a})`,
                `(x \u2212 ${a}), (x + ${a}), and (x\u00B2 + ${a*a})`,
                `None of them`,
                `Only (x \u2212 ${a})`
            ])
        },
        {
            text: `Which of the following are factors of x\u2074 \u2212 ${a*a*a*a}?`,
            answer: `(x \u2212 ${a}), (x + ${a}), and (x\u00B2 + ${a*a})`,
            options: shuffle([
                `(x \u2212 ${a}), (x + ${a}), and (x\u00B2 + ${a*a})`,
                `Only (x \u2212 ${a})`,
                `Only (x + ${a})`,
                `None of them`,
                `Both (x \u2212 ${a}) and (x + ${a})`
            ])
        }
    ];
    let v = pick(variants);
    return { type: 'mc', text: v.text, answer: v.answer, options: v.options };
}

// ============ Q5: X-intercepts of quadratic f(x) = a(x+h)² + k ============
function genQ5() {
    let h = randInt(-5, 5);
    let a = pick([-5, -3, -2, -1, 1, 2, 3, 5]);
    // Need k such that -k/a > 0 for real roots
    // roots at x = -h ± sqrt(-k/a)
    let sqVal = pick([1, 4, 9, 16, 25]);
    let k = -a * sqVal; // so -k/a = sqVal, sqrt = sqVal^0.5
    let sqrtVal = Math.sqrt(sqVal);
    let r1 = -h - sqrtVal;
    let r2 = -h + sqrtVal;
    let left = Math.min(r1, r2);
    let right = Math.max(r1, r2);
    let aStr = a === 1 ? '' : a === -1 ? '\u2212' : `${a}`;
    let hStr = h >= 0 ? `(x + ${h})` : `(x \u2212 ${-h})`;
    if (h === 0) hStr = 'x';
    let kSign = k >= 0 ? '+' : '\u2212';
    return {
        type: 'two_inputs',
        text: `Find the x-intercepts of the function f(x) = ${aStr}${hStr}\u00B2 ${kSign} ${Math.abs(k)}.`,
        answer: `x = ${left} and x = ${right}`,
        smallerAnswer: `${left}`,
        largerAnswer: `${right}`,
        validateSmaller: (s) => approxEq(evalFrac(s), left, 0.01),
        validateLarger: (s) => approxEq(evalFrac(s), right, 0.01),
        labels: ['Leftmost intercept x =', 'Rightmost intercept x =']
    };
}

// ============ Q6: Number of real roots ============
function genQ6() {
    let variants = [
        { text: 'The polynomial x(x\u00B2 \u2212 4)(x\u00B2 + 4) has how many real roots?', answer: '3' },
        { text: 'The polynomial x\u00B2(x\u00B2 \u2212 9) has how many real roots?', answer: '3' },
        { text: 'The polynomial (x\u00B2 + 1)(x\u00B2 \u2212 1) has how many real roots?', answer: '2' },
        { text: 'The polynomial x(x \u2212 1)(x + 2)(x\u00B2 + 3) has how many real roots?', answer: '3' },
        { text: 'The polynomial (x\u00B2 \u2212 4)(x\u00B2 \u2212 9) has how many real roots?', answer: '4' },
        { text: 'The polynomial x\u00B3(x\u00B2 + 5) has how many real roots?', answer: '1' },
        { text: 'The polynomial (x\u00B2 + 1)(x\u00B2 + 4) has how many real roots?', answer: '0' },
        { text: 'The polynomial x(x\u00B2 \u2212 1)(x\u00B2 + 1) has how many real roots?', answer: '3' },
    ];
    let v = pick(variants);
    let options = shuffle(['0', '1', '2', '3', '4', '5']);
    if (!options.includes(v.answer)) options[0] = v.answer;
    options = shuffle(options.slice(0, 5));
    if (!options.includes(v.answer)) options.push(v.answer);
    return { type: 'mc', text: v.text, answer: v.answer, options: shuffle(options) };
}

// ============ Q7: Exponent simplification ============

    let variants = [

            answer: '\u22123 / (p\u00B9\u2070)',

        },
        {
            text: '(2a\u00B3b\u00B2)\u00B2 / (4a\u00B2b) =',

            options: ['a\u2074b\u00B3', '2a\u2074b\u00B3', 'a\u2076b\u2074', '2a\u2075b', 'a\u00B2b']
        },
        {
            text: '(x\u207B\u00B2y\u00B3)\u00B2 =',

        },
        {

        },
        {

    ];
    let v = pick(variants);

// ============ Q8: Domain of radical function ============
function genQ8() {
    let a = pick([2, 3, 4, 5]);
    let a2 = a * a;
    let variants = [
        {
            text: `Which of the following is the domain of the function \u221A(${a2} \u2212 x\u00B2)?`,
            answer: `\u2212${a} \u2264 x \u2264 ${a}`,
            options: [`\u2212${a} \u2264 x \u2264 ${a}`, `x \u2264 \u2212${a}`, `x \u2265 ${a}`, `x \u2264 \u2212${a} or x \u2265 ${a}`, `All real numbers`]
        },
        {
            text: `Which of the following is the domain of the function \u221A(x\u00B2 \u2212 ${a2})?`,
            answer: `x \u2264 \u2212${a} or x \u2265 ${a}`,
            options: [`x \u2264 \u2212${a} or x \u2265 ${a}`, `\u2212${a} \u2264 x \u2264 ${a}`, `x \u2265 ${a}`, `x \u2264 \u2212${a}`, `All real numbers`]
        },
        {
            text: `Which of the following is the domain of the function \u221A(x + ${a})?`,
            answer: `x \u2265 \u2212${a}`,
            options: [`x \u2265 \u2212${a}`, `x \u2265 ${a}`, `x \u2264 ${a}`, `All real numbers`, `x > 0`]
        },
    ];
    let v = pick(variants);
    return { type: 'mc', text: v.text, answer: v.answer, options: shuffle(v.options) };
}

// ============ Q10: Graph reading - where is f(x) < 0 ============
function genQ10() {
    // Parabola opening up with x-intercepts at a and b
    let a = randInt(-4, -1);
    let b = randInt(1, 5);
    let answer = `${a} < x < ${b}`;
    let options = shuffle([
        answer,
        `x < ${a} or x > ${b}`,
        `x < ${a}`,
        `x > ${b}`,
        `${a} \u2264 x \u2264 ${b}`
    ]);
    return {
        type: 'mc_graph',
        text: `Suppose f(x) is a function whose graph is shown here. The x-intercepts are (${a}, 0) and (${b}, 0). Then f(x) < 0 whenever:`,
        answer: answer,
        options: options,
        drawGraph: (ctx, w, h) => {
            // Draw axes
            let cx = w * (-a) / (b - a + 4) + w * 2 / (b - a + 4);
            let cy = h * 0.6;
            ctx.strokeStyle = '#999';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(0, cy); ctx.lineTo(w, cy);
            ctx.moveTo(cx, 0); ctx.lineTo(cx, h);
            ctx.stroke();
            // Draw parabola y = (x-a)(x-b)
            ctx.strokeStyle = '#f5576c';
            ctx.lineWidth = 2;
            ctx.beginPath();
            let first = true;
            for (let px = 0; px < w; px++) {
                let x = a - 2 + (b - a + 4) * px / w;
                let y = (x - a) * (x - b);
                let py = cy - y * (h * 0.08);
                if (py < -10 || py > h + 10) { first = true; continue; }
                if (first) { ctx.moveTo(px, py); first = false; }
                else ctx.lineTo(px, py);
            }
            ctx.stroke();
            // Labels
            ctx.fillStyle = '#333';
            ctx.font = '12px Inter, sans-serif';
            let ax = w * (a - a + 2) / (b - a + 4);
            let bx = w * (b - a + 2) / (b - a + 4);
            ctx.fillText(`(${a},0)`, ax - 15, cy + 15);
            ctx.fillText(`(${b},0)`, bx - 5, cy + 15);
        }
    };
}

// ============ Q11: Area of rectangle under curve ============
function genQ11() {
    // f(x) = x² - bx + c, width from a to a+w, height = f(a)
    let coeff_b = pick([2, 4, 6]);
    let coeff_c = pick([8, 12, 16, 20]);
    // f(x) = x² - bx + c
    let a_val = randInt(0, 1); // could be decimal
    let a_dec = pick([0, 0.5]);
    let a = a_val + a_dec;
    let b_dec = pick([0.5, 1, 1.5]);
    let b = a + b_dec;
    // Width = b - a
    let width = b - a;
    // Height = f(a) since the rectangle sits under the curve at x=a
    let height = a * a - coeff_b * a + coeff_c;
    let area = width * height;
    let areaRounded = Math.round(area * 100) / 100;
    return {
        type: 'input',
        text: `The curved line in the graph below is the function f(x) = x\u00B2 \u2212 ${coeff_b}x + ${coeff_c}.<br>If a = ${a} and b = ${b}, what is the area of the rectangle with corners at (a, 0), (b, 0), (b, f(a)), and (a, f(a))?`,
        answer: `${areaRounded}`,
        validate: (s) => approxEq(parseFloat(s), areaRounded, 0.05)
    };
}

// ============ Q13: Rectangle word problem ============

// ============ Q17: Quadratic inequality ============
function genQ17() {
    // x² + bx < c => x² + bx - c < 0
    let r1 = randInt(-7, -2);
    let r2 = randInt(1, 6);
    // (x - r1)(x - r2) < 0 => x² - (r1+r2)x + r1*r2 < 0
    // rewrite as x² + bx < c
    let sum = r1 + r2;
    let prod = r1 * r2;
    let bCoeff = -sum;
    let c = -prod;
    let bStr = bCoeff >= 0 ? `+ ${bCoeff}` : `\u2212 ${-bCoeff}`;
    let answer = `${r1} < x < ${r2}`;
    let options = shuffle([
        answer,
        `x < ${r1} or x > ${r2}`,
        `x < ${r1}`,
        `x > ${r2}`,
        `${r1} \u2264 x \u2264 ${r2}`
    ]);
    return {
        type: 'mc',
        text: `The inequality x\u00B2 ${bStr}x < ${c} is equivalent to:`,
        answer: answer,
        options: options
    };
}

// ============ Q21: Absolute value inequality ============
function genQ21() {
    let a = randInt(2, 5);
    let b = randInt(5, 20);
    let c_num = pick([1, 3, 5]);
    let c_den = 2;
    let c = c_num / c_den;
    // |ax - b| <= c => -c <= ax - b <= c => (b-c)/a <= x <= (b+c)/a
    let lo_num = 2 * b - c_num;
    let lo_den = 2 * a;
    let hi_num = 2 * b + c_num;
    let hi_den = 2 * a;
    let g1 = gcd(lo_num, lo_den);
    let g2 = gcd(hi_num, hi_den);
    let loStr = lo_den / g1 === 1 ? `${lo_num/g1}` : `${lo_num/g1}/${lo_den/g1}`;
    let hiStr = hi_den / g2 === 1 ? `${hi_num/g2}` : `${hi_num/g2}/${hi_den/g2}`;
    let answer = `${loStr} \u2264 x \u2264 ${hiStr}`;
    let options = shuffle([
        answer,
        `x \u2264 ${loStr} or x \u2265 ${hiStr}`,
        `\u2212${hiStr} \u2264 x \u2264 ${loStr}`,
        `x \u2264 ${hiStr}`,
        `${loStr} < x < ${hiStr}`
    ]);
    return {
        type: 'mc',
        text: `The inequality |${a}x \u2212 ${b}| \u2264 ${c_num}/${c_den} is equivalent to:`,
        answer: answer,
        options: options
    };
}

function genQ25() {
    // log10(x) + log10(x - a) = 1 => log10(x(x-a)) = 1 => x(x-a) = 10
    // x² - ax - 10 = 0
    // We need nice solutions. Let's pick roots r1, r2 where r1*r2 = -10 and r1+r2 = a
    let pairs = [
        { r1: 5, r2: -2, a: 3 },  // x²-3x-10=0 => (x-5)(x+2)=0, x=5 (x=-2 rejected)

    let positiveRoot = Math.max(p.r1, p.r2);
    return {
        type: 'input',
        text: `Solve the equation log<sub>10</sub>(x) + log<sub>10</sub>(x \u2212 ${p.a}) = 1 for x.<br>x =`,
        answer: `${positiveRoot}`,
        validate: (s) => approxEq(parseFloat(s), positiveRoot, 0.01)
    };
}

// ============ QUIZ ENGINE ============

function generateQuiz() {
    questions = [];
    const generators = [
        genQ1, genQ2, genQ3, genQ4, genQ5, genQ6, genQ7, genQ8, genQ9,
        genQ10, genQ11, genQ12, genQ13, genQ14, genQ15, genQ16, genQ17,
        genQ18, genQ19, genQ20, genQ21, genQ22, genQ23, genQ24, genQ25
    ];
    generators.forEach(gen => questions.push(gen()));
    selectedOptions = {};
    selectedGraphs = {};
    quizSubmitted = false;
    document.getElementById('submit-btn').textContent = 'Submit Quiz';
    document.getElementById('submit-btn').className = 'btn btn-primary';
    document.getElementById('submit-btn').onclick = submitQuiz;
    document.getElementById('results-area').classList.add('hidden');
    document.getElementById('actions').classList.remove('hidden');
    timeLeft = 40 * 60;
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(updateTimer, 1000);
    updateTimer();
    renderQuiz();
    window.scrollTo(0, 0);
}

function renderQuiz() {
    let html = '';
    questions.forEach((q, i) => {
        html += `<div class="card" id="q${i}">`;
        html += `<div class="question-header"><span class="question-number">Question ${i+1}</span><span class="question-pts">1 pt</span></div>`;
        html += `<div class="question-text">${q.text}</div>`;

        if (q.type === 'mc' || q.type === 'mc_graph') {
            if (q.type === 'mc_graph' && q.drawGraph) {
                html += `<canvas id="graphCanvas${i}" width="300" height="200" style="display:block;margin:0 auto 16px;border:1px solid #eee;border-radius:8px;"></canvas>`;
            }
            html += `<div class="options" id="opts${i}">`;
            q.options.forEach((opt, j) => {
                html += `<label id="opt${i}_${j}" onclick="selectOption(${i}, ${j})">
                    <input type="radio" name="q${i}" value="${j}"> ${opt}
                </label>`;
            });
            html += `</div>`;
        } else if (q.type === 'input') {
            html += `<div class="inline-input">
                <input type="text" class="text-input" id="input${i}" placeholder="Answer">
            </div>`;
        } else if (q.type === 'two_inputs') {
            let labels = q.labels || ['Smaller value =', 'Larger value ='];
            html += `<div style="display:flex;flex-direction:column;gap:12px;">
                <div class="input-row">${labels[0]} <input type="text" class="text-input" id="input${i}_small" placeholder=""></div>
                <div class="input-row">${labels[1]} <input type="text" class="text-input" id="input${i}_large" placeholder=""></div>
            </div>`;
        } else if (q.type === 'graph_pick') {
            html += `<div class="graph-options" id="graphs${i}"></div>`;
        }
        html += `<div class="correction-text hidden" id="correction${i}"></div>`;
        html += `</div>`;
    });
    document.getElementById('quiz-area').innerHTML = html;

    // Draw canvases for mc_graph
    questions.forEach((q, i) => {
        if (q.type === 'mc_graph' && q.drawGraph) {
            let canvas = document.getElementById(`graphCanvas${i}`);
            if (canvas) {
                let ctx = canvas.getContext('2d');
                q.drawGraph(ctx, canvas.width, canvas.height);
            }
        }
    });

    // Draw graph_pick canvases
    questions.forEach((q, i) => {
        if (q.type === 'graph_pick') {
            let container = document.getElementById(`graphs${i}`);
            q.funcs.forEach((f, j) => {
                let div = document.createElement('div');
                div.className = 'graph-option';
                div.id = `graph${i}_${j}`;
                div.onclick = () => selectGraph(i, j);
                let canvas = document.createElement('canvas');
                canvas.width = 160;
                canvas.height = 130;
                let ctx = canvas.getContext('2d');
                let cx = 80, cy = 80;
                // axes
                ctx.strokeStyle = '#ccc';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(0, cy); ctx.lineTo(160, cy);
                ctx.moveTo(cx, 0); ctx.lineTo(cx, 130);
                ctx.stroke();
                // function
                ctx.strokeStyle = '#f5576c';
                ctx.lineWidth = 2;
                ctx.beginPath();
                let first = true;
                for (let px = 0; px < 160; px++) {
                    let x = (px - cx) / 25;
                    let y = f.fn(x);
                    if (y === null || !isFinite(y) || Math.abs(y) > 8) { first = true; continue; }
                    let py = cy - y * 15;
                    if (py < -10 || py > 140) { first = true; continue; }
                    if (first) { ctx.moveTo(px, py); first = false; }
                    else ctx.lineTo(px, py);
                }
                ctx.stroke();
                div.appendChild(canvas);
                container.appendChild(div);
            });
        }
    });
}

function selectOption(qi, oi) {
    if (quizSubmitted) return;
    selectedOptions[qi] = oi;
    document.querySelectorAll(`#opts${qi} label`).forEach((o, j) => {
        o.classList.toggle('selected', j === oi);
    });
}

function selectGraph(qi, gi) {
    if (quizSubmitted) return;
    selectedGraphs[qi] = gi;
    document.querySelectorAll(`#graphs${qi} .graph-option`).forEach((g, j) => {
        g.classList.toggle('selected', j === gi);
    });
}

function submitQuiz() {
    quizSubmitted = true;
    if (timerInterval) clearInterval(timerInterval);
    let score = 0;
    let results = [];

    questions.forEach((q, i) => {
        let correct = false;

        if (q.type === 'mc' || q.type === 'mc_graph') {
            let sel = selectedOptions[i];
            if (sel !== undefined) {
                correct = (q.options[sel] === q.answer);
                document.querySelectorAll(`#opts${i} label`).forEach((o, j) => {
                    o.classList.remove('selected');
                    if (q.options[j] === q.answer) o.classList.add('correct');
                    if (j === sel && !correct) o.classList.add('incorrect');
                });
            } else {
                document.querySelectorAll(`#opts${i} label`).forEach((o, j) => {
                    if (q.options[j] === q.answer) o.classList.add('correct');
                });
            }
        } else if (q.type === 'input') {
            let input = document.getElementById(`input${i}`);
            correct = q.validate(input.value);
            input.classList.add(correct ? 'correct' : 'incorrect');
            if (!correct) {
                document.getElementById(`correction${i}`).textContent = `Correct answer: ${q.answer}`;
                document.getElementById(`correction${i}`).classList.remove('hidden');
            }
        } else if (q.type === 'two_inputs') {
            let smallInput = document.getElementById(`input${i}_small`);
            let largeInput = document.getElementById(`input${i}_large`);
            let sc = q.validateSmaller(smallInput.value);
            let lc = q.validateLarger(largeInput.value);
            correct = sc && lc;
            smallInput.classList.add(sc ? 'correct' : 'incorrect');
            largeInput.classList.add(lc ? 'correct' : 'incorrect');
            if (!correct) {
                document.getElementById(`correction${i}`).textContent = `Correct answer: ${q.answer}`;
                document.getElementById(`correction${i}`).classList.remove('hidden');
            }
        } else if (q.type === 'graph_pick') {
            let sel = selectedGraphs[i];
            correct = (sel === q.answer);
            document.querySelectorAll(`#graphs${i} .graph-option`).forEach((g, j) => {
                g.classList.remove('selected');
                if (j === q.answer) g.classList.add('correct');
                if (j === sel && !correct) g.classList.add('incorrect');
            });
        }

        if (correct) score++;
        results.push({ num: i + 1, correct, question: q.text.replace(/<[^>]*>/g, ' ').substring(0, 60) });
    });

    let total = 25;
    let perfect = score === total;
    let resultsHtml = `<div class="card score-card">
        <div class="score-big ${perfect ? 'perfect' : ''}">${score}/${total}</div>
        <div class="score-label">${perfect ? 'PERFECT SCORE! Amazing!' : score >= 20 ? 'Great job! Almost there!' : score >= 15 ? 'Good effort! Keep practicing!' : 'Keep going, you\'ll get there!'}</div>
        <div class="results-detail">`;
    results.forEach(r => {
        resultsHtml += `<div class="result-row">
            <span>Q${r.num}: ${r.question}...</span>
            <span class="${r.correct ? 'check' : 'cross'}">${r.correct ? '\u2713' : '\u2717'}</span>
        </div>`;
    });
    resultsHtml += `</div></div>`;
    document.getElementById('results-area').innerHTML = resultsHtml;
    document.getElementById('results-area').classList.remove('hidden');

    saveResult(score);
    renderHistory();

    document.getElementById('submit-btn').textContent = 'Generate New Test';
    document.getElementById('submit-btn').className = 'btn btn-success';
    document.getElementById('submit-btn').onclick = generateQuiz;
    document.getElementById('results-area').scrollIntoView({ behavior: 'smooth' });
}

function updateTimer() {
    let m = Math.floor(timeLeft / 60);
    let s = timeLeft % 60;
    document.getElementById('timer').textContent = `${m}:${s.toString().padStart(2, '0')}`;
    if (timeLeft <= 0) {
        clearInterval(timerInterval);
        if (!quizSubmitted) submitQuiz();
    }
    timeLeft--;
}

function getHistory() {
    try { return JSON.parse(localStorage.getItem('algebra2History') || '[]'); }
    catch { return []; }
}

function saveResult(score) {
    let history = getHistory();
    history.push({ date: new Date().toLocaleString(), score: score, total: 25 });
    localStorage.setItem('algebra2History', JSON.stringify(history));
}

function renderHistory() {
    let history = getHistory();
    if (history.length === 0) return;
    let html = `<div class="card history-card"><h3>Previous Attempts</h3>`;
    let recent = history.slice(-10).reverse();
    recent.forEach((h, i) => {
        let pct = Math.round(h.score / h.total * 100);
        html += `<div class="history-row">
            <span>#${history.length - i} \u2014 ${h.date}</span>
            <span style="font-weight:600;color:${pct === 100 ? '#22c55e' : pct >= 70 ? '#f5576c' : '#ef4444'}">${h.score}/${h.total} (${pct}%)</span>
        </div>`;
    });
    html += `</div>`;
    document.getElementById('history-area').innerHTML = html;
}

generateQuiz();
renderHistory();
</script>
</body>
</html>
